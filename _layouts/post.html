---
layout: default
---
<article class="post">
  <header class="post-header">
    {% if page.category %}<span class="post-tag">{{ page.category }}</span>{% endif %}
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date | date: "%Y 年 %-m 月 %-d 日" }}</time>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="post-footer">
    <a class="back-link" href="{{ '/' | relative_url }}">← 返回首页</a>
  </div>
</article>
